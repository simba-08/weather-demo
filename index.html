<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherPro Advanced</title>

<style>
body{
  font-family: Arial;
  margin:0;
  color:white;
  background:linear-gradient(#0f172a,#020617);
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
}
nav a{
  color:white;
  margin:0 10px;
  cursor:pointer;
  text-decoration:none;
}

/* PAGES */
.page{
  display:none;
  padding:30px;
  text-align:center;
}
.active{
  display:block;
}

/* UI */
input{
  padding:10px;
  width:60%;
  border-radius:8px;
  border:none;
}
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}
.card{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<!-- NAV -->

<nav>
  <h2>🌦 WeatherPro</h2>
  <div>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('forecast')">Forecast</a>
    <a onclick="showPage('about')">About</a>
  </div>
</nav>

<!-- HOME -->

<div id="home" class="page active">
  <h1>Live Weather</h1>

  <input id="cityInput" placeholder="Enter city">
  <br><br>

<button onclick="fetchWeather()">Search</button> <button onclick="getLocationWeather()">📍 My Location</button>

  <p id="status"></p>
  <div id="weatherBox" class="card" style="display:none;"></div>
</div>

<!-- FORECAST -->

<div id="forecast" class="page">
  <h1>5-Day Forecast</h1>

  <input id="forecastCity" placeholder="Enter city">
  <button onclick="getForecast()">Search</button>

  <div id="forecastBox"></div>
</div>

<!-- ABOUT -->

<div id="about" class="page">
  <h1>About</h1>
  <p>This is an advanced weather app using OpenWeather API.</p>
  <p>Features:</p>
  <ul>
    <li>Live weather</li>
    <li>Location weather</li>
    <li>5-day forecast</li>
    <li>Dynamic UI</li>
  </ul>
</div>

<script>
const API_KEY = "76774352d26eb37949d4c60daa3e41af";

let unit = "C";
let weatherData = null;

/* PAGE SWITCH */
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* WEATHER */
async function fetchWeather(){
  const city = document.getElementById("cityInput").value;
  setStatus("Loading...");

  const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}`);
  weatherData = await res.json();

  displayWeather();
}

function getLocationWeather(){
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const {latitude, longitude} = pos.coords;

    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${API_KEY}`
    );

    weatherData = await res.json();
    displayWeather();
  });
}

function displayWeather(){
  const box = document.getElementById("weatherBox");
  const w = weatherData;

  const tempC = (w.main.temp - 273.15).toFixed(1);
  const tempF = ((w.main.temp - 273.15)*9/5+32).toFixed(1);

  const temp = unit==="C" ? tempC+"°C" : tempF+"°F";

  box.style.display="block";

  box.innerHTML = `
    <h2>${w.name}</h2>
    <h1>${temp}</h1>
    <p>${w.weather[0].description}</p>
    <p>Humidity: ${w.main.humidity}%</p>
    <p>Wind: ${(w.wind.speed*3.6).toFixed(1)} km/h</p>

    <button onclick="switchUnit('C')">°C</button>
    <button onclick="switchUnit('F')">°F</button>
  `;

  setStatus("");
}

/* FORECAST */
async function getForecast(){
  const city = document.getElementById("forecastCity").value;

  const res = await fetch(
    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}`
  );

  const data = await res.json();

  let output = "";

  data.list.slice(0,5).forEach(item=>{
    const temp = (item.main.temp - 273.15).toFixed(1);

    output += `
      <div class="card">
        <p>${item.dt_txt}</p>
        <h2>${temp}°C</h2>
        <p>${item.weather[0].description}</p>
      </div>
    `;
  });

  document.getElementById("forecastBox").innerHTML = output;
}

/* UTILS */
function switchUnit(u){
  unit = u;
  displayWeather();
}

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

/* DEFAULT LOAD */
window.onload = ()=>{
  document.getElementById("cityInput").value="London";
  fetchWeather();
}
</script>

</body>
</html>
